<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dev Planner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
 --bg1:#ffffff;--bg2:#f5f5f4;--bg3:#f0efec;
 --bgd:#fcebeb;--bgw:#faeeda;--bgs:#eaf3de;
 --t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;
 --td:#a32d2d;--tw:#854f0b;--ts:#3b6d11;
 --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
 --bdw:rgba(133,79,11,0.4);--bdi:rgba(24,95,165,0.4);--bdd:rgba(163,45,45,0.4);
 --r1:8px;--r2:12px;
 --f:'Inter',system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
 --bg1:#1c1c1a;--bg2:#252523;--bg3:#2c2c2a;
 --bgd:#501313;--bgw:#412402;--bgs:#173404;
 --t1:#f0efec;--t2:#b4b2a9;--t3:#888780;
 --td:#f09595;--tw:#fac775;--ts:#97c459;
 --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);
 --bdw:rgba(250,199,117,0.4);--bdi:rgba(133,183,235,0.4);--bdd:rgba(240,149,149,0.4);
}}
html,body{height:100%;margin:0;background:var(--bg3);}
body{font-family:var(--f);color:var(--t1);display:flex;flex-direction:column;height:100%;}
#app{display:flex;align-items:stretch;border:0.5px solid var(--bd);overflow:hidden;flex:1;}

/* ── Sprint planner ── */
#pl{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg1);}
#pl-head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--bd);flex-wrap:wrap;flex-shrink:0;position:relative;}
.pl-title{font-size:15px;font-weight:500;flex-shrink:0;cursor:text;outline:none;border-bottom:1px solid transparent;padding-bottom:1px;transition:border-color .1s;}
.pl-title:focus{border-bottom-color:var(--bdi);}
.pl-title:hover:not(:focus){border-bottom-color:var(--bd);}
.pl-kpis{display:flex;gap:8px;flex:1;flex-wrap:wrap;align-items:center;}
.pl-kpi{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r1);padding:4px 10px;font-size:12px;color:var(--t2);}
.pl-kpi b{font-weight:500;color:var(--t1);}
.pl-warn{background:var(--bgw);border:0.5px solid var(--bdw);border-radius:var(--r1);padding:4px 10px;font-size:12px;color:var(--tw);}
.pl-hbtn{font-size:12px;padding:5px 12px;border-radius:var(--r1);border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--f);}
.pl-hbtn:hover{background:var(--bg2);}
#pl-cw{overflow-x:auto;overflow-y:hidden;background:var(--bg3);flex:1;display:flex;flex-direction:column;}
#pl-canvas{flex:1;min-height:0;display:flex;flex-direction:column;min-width:max-content;}
#pl-sh{flex-shrink:0;}
#pl-rows{flex:1;min-height:0;overflow:hidden;position:relative;display:flex;flex-direction:column;}
#pl-ar{flex-shrink:0;}
#pl-cap{flex-shrink:0;}
#pl-canvas{position:relative;}
#pl-sh{display:flex;background:var(--bg1);border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:30;}
.pl-hg{flex-shrink:0;position:sticky;left:0;z-index:31;background:var(--bg1);border-right:0.5px solid var(--bd);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--t3);}
.pl-sc2{flex-shrink:0;padding:7px 10px;border-right:0.5px solid var(--bd);position:relative;overflow:hidden;}
.pl-sn{font-size:11px;color:var(--t3);font-weight:500;}
.pl-sd{font-size:12px;color:var(--t2);margin-top:1px;}
.pl-qtick{position:absolute;top:0;bottom:0;width:0.5px;background:var(--bd);pointer-events:none;}
#pl-rows{position:relative;}
.pl-row{display:flex;align-items:stretch;border-bottom:0.5px solid var(--bd);transition:transform .14s ease,opacity .14s ease;}
.pl-row.is-ghost{opacity:.2;pointer-events:none;}
.pl-rg{flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg1);border-right:0.5px solid var(--bd);display:flex;align-items:stretch;}
.pl-dh{width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:grab;border-right:0.5px solid var(--bd);background:var(--bg1);transition:background .1s;}
.pl-dh:hover{background:var(--bg2);}
.pl-dh:active{cursor:grabbing;}
.pl-gripicon{display:flex;flex-direction:column;gap:3px;opacity:.25;pointer-events:none;}
.pl-dh:hover .pl-gripicon,.np-dh:hover .pl-gripicon{opacity:.55;}
.pl-gripdot{width:16px;height:2px;background:var(--t2);border-radius:1px;}
.pl-rc{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:10px 8px 10px 12px;}
.pl-rn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;outline:none;color:var(--t1);border-bottom:1px solid transparent;padding-bottom:1px;transition:border-color .1s;}
.pl-rn:focus{border-bottom-color:var(--bdi);}
.pl-rn:hover:not(:focus){border-bottom-color:var(--bd);}
.pl-rs{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.pl-pill{font-size:11px;padding:2px 7px;border-radius:3px;background:var(--bg2);color:var(--t2);white-space:nowrap;}
.pl-add-blk{font-size:11px;padding:2px 7px;border-radius:3px;border:0.5px dashed var(--bd2);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--f);}
.pl-add-blk:hover{background:var(--bg2);color:var(--t2);}
.pl-del,.np-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px 8px;line-height:1;flex-shrink:0;border-radius:4px;align-self:center;margin-right:4px;opacity:0;transition:opacity .12s;}
.pl-del:hover,.np-del:hover{color:var(--td);background:var(--bgd);}
.pl-rg:hover .pl-del,.np-card:hover .np-del{opacity:1;}
.pl-rt{flex:1;position:relative;overflow:visible;}
.pl-cell{position:absolute;top:0;bottom:0;border-right:0.5px solid var(--bd);opacity:.4;cursor:pointer;z-index:0;}
.pl-cell.bound{opacity:1;}
.pl-cell:hover{background:rgba(128,128,128,.1);opacity:1;}
.pl-blk{position:absolute;border-radius:var(--r1);display:flex;cursor:move;user-select:none;transition:box-shadow .1s;}
.pl-blk.selected{box-shadow:0 0 0 2px #3B82F6;}
.pl-rhl,.pl-rhr{width:10px;flex-shrink:0;cursor:ew-resize;background:rgba(128,128,128,.08);display:flex;align-items:center;justify-content:center;z-index:2;}
.pl-rhl:hover,.pl-rhr:hover{background:rgba(128,128,128,.2);}
.pl-rhl{border-radius:var(--r1) 0 0 var(--r1);}
.pl-rhr{border-radius:0 var(--r1) var(--r1) 0;}
.pl-grip{width:2px;height:16px;background:rgba(128,128,128,.4);border-radius:1px;}
.pl-bb{flex:1;padding:5px 4px;min-width:0;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.pl-bn{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.pl-bsub{font-size:10px;pointer-events:none;}
#pl-cap{display:flex;background:var(--bg1);border-top:0.5px solid var(--bd);flex-shrink:0;}
.pl-cg{flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg1);border-right:0.5px solid var(--bd);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--t3);}
.pl-cc{flex-shrink:0;padding:6px 10px;border-right:0.5px solid var(--bd);display:flex;flex-direction:column;justify-content:center;gap:4px;}
.pl-ctrack{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.pl-cfill{height:100%;}
.pl-clbl{font-size:11px;}
.pl-cinfo{display:flex;align-items:center;gap:5px;}

/* color picker */
#color-picker{position:absolute;z-index:200;background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--r1);padding:8px;display:none;gap:6px;flex-wrap:wrap;width:140px;}
.cp-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.cp-swatch:hover{transform:scale(1.2);}
.cp-swatch.active{border-color:var(--t1);}

/* block edit popover */
#blk-edit{position:absolute;z-index:100;background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--r1);padding:10px 12px;display:none;flex-direction:column;gap:8px;min-width:200px;}
.be-row{display:flex;align-items:center;gap:8px;}
.be-lbl{font-size:11px;color:var(--t3);width:40px;}
.be-inp{flex:1;height:26px;padding:0 7px;border:0.5px solid var(--bd2);border-radius:var(--r1);background:var(--bg2);color:var(--t1);font-size:12px;font-family:var(--f);outline:none;min-width:0;}
.be-inp:focus{border-color:var(--bdi);}
.be-inp::-webkit-inner-spin-button,.be-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.be-tag{font-size:11px;color:var(--t3);white-space:nowrap;}
.be-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:2px;}
.be-btn{font-size:11px;padding:3px 10px;border-radius:var(--r1);border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--f);}
.be-btn:hover{background:var(--bg2);}
.be-btn-del{color:var(--td);border-color:var(--bdd);}
.be-btn-del:hover{background:var(--bgd);}

/* drop lines */
#pl-drop-line{position:absolute;left:0;right:0;height:2px;background:#3B82F6;z-index:50;pointer-events:none;display:none;border-radius:1px;}
#np-drop-line{position:absolute;left:0;right:0;height:2px;background:#3B82F6;z-index:50;pointer-events:none;display:none;border-radius:1px;}
#pl-drag-clone{position:fixed;pointer-events:none;z-index:1000;overflow:hidden;display:none;border-radius:var(--r2);border:1px solid var(--bd2);background:var(--bg1);}

/* ── Next panel ── */
#next-panel{width:224px;flex-shrink:0;display:flex;flex-direction:column;border-left:2px solid var(--bd2);background:var(--bg2);}
#np-header{padding:10px 14px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:6px;flex-shrink:0;}
#np-label{font-size:12px;font-weight:500;color:var(--t2);flex:1;}
#np-count{font-size:11px;color:var(--t3);background:var(--bg1);border:0.5px solid var(--bd);border-radius:10px;padding:1px 7px;}
#np-add-row{padding:8px 8px 0;flex-shrink:0;}
#np-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;position:relative;}
.np-abtn{width:100%;font-size:12px;padding:7px 10px;border:0.5px dashed var(--bd2);background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--r1);font-family:var(--f);text-align:left;}
.np-abtn:hover{background:var(--bg1);color:var(--t2);}
.np-card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:var(--r1);display:flex;align-items:stretch;min-height:60px;transition:transform .14s ease,opacity .14s ease;user-select:none;}
.np-card.is-ghost{opacity:.18;pointer-events:none;}
.np-dh{width:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:grab;border-right:0.5px solid var(--bd);border-radius:var(--r1) 0 0 var(--r1);transition:background .1s;}
.np-dh:hover{background:var(--bg2);}
.np-dh:active{cursor:grabbing;}
.np-content{flex:1;min-width:0;padding:8px 6px 8px 10px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
.np-name{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;outline:none;border-bottom:1px solid transparent;padding-bottom:1px;transition:border-color .1s;}
.np-name:focus{border-bottom-color:var(--bdi);}
.np-name:hover:not(:focus){border-bottom-color:var(--bd);}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;align-items:center;justify-content:center;}
.modal-box{background:var(--bg1);border-radius:var(--r2);padding:24px;border:0.5px solid var(--bd2);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;}
#del-modal .modal-box{max-width:380px;width:90%;}
#del-msg{font-size:14px;color:var(--t1);margin-bottom:24px;line-height:1.5;}
#del-cancel,#set-cancel{font-size:13px;padding:7px 16px;border-radius:var(--r1);border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--f);transition:background .1s,color .1s;}
#del-cancel:hover,#set-cancel:hover{background:var(--bg2);color:var(--t1);}
#del-cancel:active,#set-cancel:active{background:var(--bg3);}
#del-confirm{font-size:13px;padding:7px 16px;border-radius:var(--r1);border:none;background:#C0392B;color:#fff;cursor:pointer;font-family:var(--f);font-weight:500;transition:background .1s,transform .08s;}
#del-confirm:hover{background:#A93226;}
#del-confirm:active{background:#922B21;transform:scale(.98);}
#set-modal .modal-box{width:340px;}
#set-modal h2{font-size:15px;font-weight:500;margin-bottom:20px;color:var(--t1);}
.set-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.set-label{font-size:12px;color:var(--t2);}
.set-inp{height:36px;padding:0 10px;border:0.5px solid var(--bd2);border-radius:var(--r1);background:var(--bg2);color:var(--t1);font-size:14px;font-family:var(--f);outline:none;width:100%;}
.set-inp:focus{border-color:var(--bdi);}
.set-inp::-webkit-inner-spin-button,.set-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
#set-save{font-size:13px;padding:7px 16px;border-radius:var(--r1);border:none;background:var(--t1);color:var(--bg1);cursor:pointer;font-family:var(--f);font-weight:500;transition:opacity .1s,transform .08s;}
#set-save:hover{opacity:.85;}
#set-save:active{opacity:.7;transform:scale(.98);}

/* ── Menu dropdown ── */
#pl-menu-btn{font-size:18px;padding:4px 10px;border-radius:var(--r1);border:0.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--f);line-height:1;letter-spacing:1px;}
#pl-menu-btn:hover{background:var(--bg2);}
#pl-menu{position:absolute;background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--r1);padding:4px;min-width:140px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.pl-menu-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;font-size:13px;color:var(--t1);cursor:pointer;border-radius:6px;border:none;background:transparent;font-family:var(--f);text-align:left;}
.pl-menu-item:hover{background:var(--bg2);}
.pl-menu-item svg{opacity:0.5;flex-shrink:0;}
.pl-menu-item .pl-menu-shortcut{margin-left:auto;font-size:11px;color:var(--t3);padding-left:16px;}
.pl-menu-item.disabled{opacity:0.35;pointer-events:none;}
</style>
</head>
<body>

<!-- Delete confirm modal -->
<div id="del-modal" class="modal-overlay">
 <div class="modal-box">
  <div id="del-msg"></div>
  <div class="modal-actions">
   <button id="del-cancel">Cancel</button>
   <button id="del-confirm">Delete</button>
  </div>
 </div>
</div>

<!-- Settings modal -->
<div id="set-modal" class="modal-overlay">
 <div class="modal-box">
  <h2>Settings</h2>
  <div class="set-field"><div class="set-label">Sprints</div><input class="set-inp" id="si-sprints" type="number" min="1" max="24"/></div>
  <div class="set-field"><div class="set-label">Weeks per sprint</div><input class="set-inp" id="si-weeks" type="number" min="1" max="8"/></div>
  <div class="set-field"><div class="set-label">Start date</div><input class="set-inp" id="si-start" type="date"/></div>
  <div class="set-field"><div class="set-label">Developers</div><input class="set-inp" id="si-devs" type="number" min="1" max="30"/></div>
  <div class="set-field"><div class="set-label">Points per dev per sprint</div><input class="set-inp" id="si-ppd" type="number" min="1" max="40"/></div>
  <div class="modal-actions">
   <button id="set-cancel">Cancel</button>
   <button id="set-save">Save</button>
  </div>
 </div>
</div>

<div id="app">
 <div id="pl">
  <div id="pl-head"></div>
  <div id="pl-cw"><div id="pl-canvas">
   <div id="pl-sh"></div>
   <div id="pl-rows"><div id="pl-drop-line"></div></div>
   <div id="pl-cap"></div>
   <div id="blk-edit">
    <div class="be-row"><span class="be-lbl">label</span><input class="be-inp" id="be-label" type="text" placeholder="optional"/></div>
    <div class="be-row"><span class="be-lbl">points</span><input class="be-inp" id="be-pts" type="number" min="1" max="9999" style="width:64px;"/><span class="be-tag" id="be-computed"></span></div>
    <div class="be-actions"><button class="be-btn be-btn-del" id="be-del">delete block</button><button class="be-btn" id="be-close">done</button></div>
   </div>
  <div id="color-picker"></div>
  </div></div>
 </div>
 <div id="next-panel">
  <div id="np-header"><span id="np-label">Later Projects</span><span id="np-count">0</span></div>
  <div id="np-add-row"><button class="np-abtn" id="np-addbtn">+ Add project</button></div>
  <div id="np-body"><div id="np-drop-line"></div></div>
 </div>
</div>
<div id="pl-drag-clone"></div>

<script>
const GW=220,NP_CARD_H=60,NP_GAP=6;
const RPAD_BASE=10,LGAP_BASE=6;
let RPAD=RPAD_BASE,LGAP=LGAP_BASE;
// Min row height = top pad(10) + title(18) + gap(5) + pts+btn row(18) + bottom pad(10)
const MIN_ROW_H=61;
const QW_BASE=37,SW_BASE=148,HPP_BASE=4.5,MINBH_BASE=36;
let QW=QW_BASE,SW=SW_BASE,HPP=HPP_BASE,MINBH=MINBH_BASE;

function computeLayout(){
 const NP_W=226;
 const availW=Math.max(0,window.innerWidth-NP_W);
 QW=Math.max(QW_BASE,Math.floor((availW-GW)/(S.sprints*4)));
 SW=QW*4;
 // CSS makes #pl-rows fill exactly the available height — just measure it directly
 const rowsEl=document.getElementById('pl-rows');
 const rowsH=rowsEl?rowsEl.getBoundingClientRect().height:0;
 const availH=rowsH>60?rowsH:Math.max(200,window.innerHeight-178);
 // Calculate total row height at scale=1 (reset all to base first)
 MINBH=MINBH_BASE;HPP=HPP_BASE;RPAD=RPAD_BASE;LGAP=LGAP_BASE;
 const totalH1=P.reduce((sum,p)=>{
  const li=assignLanes(p.blocks);
  return sum+(p.blocks.length?li.totalH:MINBH_BASE+RPAD_BASE*2);
 },0)||1;
 const rawScale=availH/totalH1;
 // The smallest possible row (no blocks) = MINBH*scale + RPAD*2.
 // If that would drop below MIN_ROW_H, lock scale to keep rows at MIN_ROW_H and scroll.
 const minRowH=Math.round(MINBH_BASE*rawScale)+Math.round(RPAD_BASE*rawScale)*2;
 atMin=minRowH<MIN_ROW_H;
 const scale=atMin?(MIN_ROW_H)/(MINBH_BASE+RPAD_BASE*2):Math.min(3,rawScale);
 MINBH=Math.max(12,Math.round(MINBH_BASE*scale));
 HPP=HPP_BASE*scale;
 RPAD=Math.max(2,Math.round(RPAD_BASE*scale));
 LGAP=Math.max(2,Math.round(LGAP_BASE*scale));
}

const PC=[
 {dot:'#F97316',bg:'rgba(249,115,22,0.1)',bd:'rgba(249,115,22,0.5)'},
 {dot:'#3B82F6',bg:'rgba(59,130,246,0.1)',bd:'rgba(59,130,246,0.5)'},
 {dot:'#10B981',bg:'rgba(16,185,129,0.1)',bd:'rgba(16,185,129,0.5)'},
 {dot:'#8B5CF6',bg:'rgba(139,92,246,0.1)',bd:'rgba(139,92,246,0.5)'},
 {dot:'#EC4899',bg:'rgba(236,72,153,0.1)',bd:'rgba(236,72,153,0.5)'},
 {dot:'#EAB308',bg:'rgba(234,179,8,0.12)',bd:'rgba(234,179,8,0.55)'},
 {dot:'#06B6D4',bg:'rgba(6,182,212,0.1)',bd:'rgba(6,182,212,0.5)'},
 {dot:'#EF4444',bg:'rgba(239,68,68,0.1)',bd:'rgba(239,68,68,0.5)'},
 {dot:'#14B8A6',bg:'rgba(20,184,166,0.1)',bd:'rgba(20,184,166,0.5)'},
 {dot:'#F43F5E',bg:'rgba(244,63,94,0.1)',bd:'rgba(244,63,94,0.5)'},
 {dot:'#A855F7',bg:'rgba(168,85,247,0.1)',bd:'rgba(168,85,247,0.5)'},
];

let uid=22;const nid=()=>String(uid++);
let planTitle='Example Roadmap';
let S={sprints:6,sprintWeeks:2,devs:4,pointsPerDev:8,startDate:'2025-04-07'};
let P=[
 {id:'1',name:'Project 1',ci:0,blocks:[
  {id:'2',label:'Example Block',points:32,startQ:0,durationQ:8},
 ]},
 {id:'4',name:'Project 2',ci:4,blocks:[

function assignLanes(blocks){
 const lanes=[],blockLane=new Map(),blockH=new Map();
 for(const blk of blocks){
  const h=bh(blk).h;blockH.set(blk.id,h);
  let placed=false;
  for(let li=0;li<lanes.length;li++){
   const ov=lanes[li].some(b=>Math.max(b.startQ,blk.startQ)<Math.min(b.startQ+b.durationQ,blk.startQ+blk.durationQ));
   if(!ov){lanes[li].push(blk);blockLane.set(blk.id,li);placed=true;break;}
  }
  if(!placed){lanes.push([blk]);blockLane.set(blk.id,lanes.length-1);}
 }
 const laneH=lanes.map(l=>Math.max(...l.map(b=>blockH.get(b.id)),MINBH));
 const laneY=[];let y=RPAD;
 for(let i=0;i<laneH.length;i++){laneY.push(y);y+=laneH[i]+(i<laneH.length-1?LGAP:0);}
 return{blockLane,laneY,laneH,totalH:y+RPAD,numLanes:lanes.length};
}

function ss(){

   const ov=Math.max(0,Math.min(blk.startQ+blk.durationQ,qe)-Math.max(blk.startQ,qs));
   return bs+(ov>0?blk.points*(ov/blk.durationQ):0);
  },0),0);
  return{n:i+1,pts,over:pts>cap,pct:Math.min(pts/cap,1.35)};
 });
}

// ── Drag ────────────────────────────────────────────────────────────────
function startReorderDrag(e,sourcePanel,id,el){
 const rect=el.getBoundingClientRect();
 const li=sourcePanel==='sprint'?P.findIndex(x=>x.id===id):N.findIndex(x=>x.id===id);
 const clone=document.getElementById('pl-drag-clone');
 if(sourcePanel==='sprint'){
  clone.innerHTML=el.querySelector('.pl-rg').outerHTML;
  clone.style.cssText=`position:fixed;pointer-events:none;z-index:1000;border-radius:var(--r2);border:1px solid var(--bd2);background:var(--bg1);overflow:hidden;display:block;width:${GW}px;height:${rect.height}px;left:${rect.left}px;top:${rect.top}px;opacity:.95;transform:scale(1.015) rotate(-0.3deg);`;
 }else{
  clone.innerHTML=el.outerHTML;
  clone.style.cssText=`position:fixed;pointer-events:none;z-index:1000;border-radius:var(--r1);border:1px solid var(--bd2);background:var(--bg1);overflow:hidden;display:block;width:${rect.width}px;height:${rect.height}px;left:${rect.left}px;top:${rect.top}px;opacity:.95;transform:scale(1.015) rotate(-0.3deg);`;
 }
 el.classList.add('is-ghost');
 reorderDrag={sourcePanel,id,li,ghostEl:el,offsetY:e.clientY-rect.top,offsetX:e.clientX-rect.left,cloneEl:clone,elH:rect.height,targetPanel:sourcePanel,ni:li};
}

function inNextPanel(e){
 const nr=document.getElementById('next-panel').getBoundingClientRect();
 return e.clientX>=nr.left&&e.clientX<=nr.right&&e.clientY>=nr.top&&e.clientY<=nr.bottom;
}

function updateReorderVisuals(e){
 if(!reorderDrag)return;
 const{offsetY,offsetX,cloneEl,li,ghostEl,elH,sourcePanel}=reorderDrag;
 cloneEl.style.top=(e.clientY-offsetY)+'px';
 cloneEl.style.left=(e.clientX-offsetX)+'px';
 const targetPanel=inNextPanel(e)?'next':'sprint';
 reorderDrag.targetPanel=targetPanel;
 document.getElementById('pl-drop-line').style.display='none';
 document.getElementById('np-drop-line').style.display='none';

 if(targetPanel==='sprint'){
  const re=document.getElementById('pl-rows'),reRect=re.getBoundingClientRect(),cy=e.clientY-reRect.top;
  const allRows=[...re.querySelectorAll('.pl-row')];
  let ni=P.length,lineY=0,visIdx=0;
  for(let i=0;i<allRows.length;i++){
   if(allRows[i]===ghostEl||allRows[i].classList.contains('is-ghost'))continue;
   const rTop=allRows[i].offsetTop,rMid=rTop+allRows[i].offsetHeight/2;
   if(cy<rMid){ni=visIdx;lineY=rTop;break;}
   lineY=rTop+allRows[i].offsetHeight;visIdx++;
  }
  document.getElementById('pl-drop-line').style.cssText=`display:block;top:${lineY}px;`;
  reorderDrag.ni=ni;
  allRows.forEach((r,i)=>{
   if(r===ghostEl){r.style.transform='';return;}
   r.style.transition='transform .14s ease';
   const visI=allRows.filter((x,xi)=>xi<i&&x!==ghostEl&&!x.classList.contains('is-ghost')).length;
   if(sourcePanel==='sprint'){
    if(ni<=li){r.style.transform=(visI>=ni&&visI<li)?`translateY(${elH}px)`:'';}
    else{r.style.transform=(visI>=li&&visI<ni)?`translateY(-${elH}px)`:'';}
   }else{r.style.transform=visI>=ni?`translateY(${NP_CARD_H}px)`:'';}
  });
  document.getElementById('np-body').querySelectorAll('.np-card').forEach(c=>{c.style.transform='';c.style.transition='';});
 }else{
  const nb=document.getElementById('np-body'),nbRect=nb.getBoundingClientRect(),cy=e.clientY-nbRect.top+nb.scrollTop;
  const cards=[...nb.querySelectorAll('.np-card')];
  let ni=N.length,lineY=8,visIdx=0;
  for(let i=0;i<cards.length;i++){
   if(cards[i]===ghostEl||cards[i].classList.contains('is-ghost'))continue;
   const cTop=cards[i].offsetTop,cMid=cTop+cards[i].offsetHeight/2;
   if(cy<cMid){ni=visIdx;lineY=cTop;break;}
   lineY=cTop+cards[i].offsetHeight+NP_GAP;visIdx++;
  }
  document.getElementById('np-drop-line').style.cssText=`display:block;top:${lineY}px;`;
  reorderDrag.ni=ni;
  cards.forEach((c,i)=>{
   if(c===ghostEl){c.style.transform='';return;}
   c.style.transition='transform .14s ease';
   const visI=cards.filter((x,xi)=>xi<i&&x!==ghostEl&&!x.classList.contains('is-ghost')).length;
   if(sourcePanel==='next'){
    if(ni<=li){c.style.transform=(visI>=ni&&visI<li)?`translateY(${NP_CARD_H+NP_GAP}px)`:'';}
    else{c.style.transform=(visI>=li&&visI<ni)?`translateY(-${NP_CARD_H+NP_GAP}px)`:'';}
   }else{c.style.transform=visI>=ni?`translateY(${NP_CARD_H+NP_GAP}px)`:'';}}
  );
  document.getElementById('pl-rows').querySelectorAll('.pl-row').forEach(r=>{r.style.transform='';r.style.transition='';});
 }
}

function finishReorderDrag(){
 if(!reorderDrag)return;
 snapshot();
 const{sourcePanel,targetPanel,id,li,ni,cloneEl}=reorderDrag;
 cloneEl.style.display='none';
 document.getElementById('pl-drop-line').style.display='none';
 document.getElementById('np-drop-line').style.display='none';
 document.getElementById('pl-rows').querySelectorAll('.pl-row').forEach(r=>{r.style.transform='';r.style.transition='';});
 document.getElementById('np-body').querySelectorAll('.np-card').forEach(c=>{c.style.transform='';c.style.transition='';});
 if(sourcePanel==='sprint'&&targetPanel==='sprint'){const item=P.splice(li,1)[0];P.splice(cl(ni,0,P.length),0,item);}
 else if(sourcePanel==='next'&&targetPanel==='next'){const item=N.splice(li,1)[0];N.splice(cl(ni,0,N.length),0,item);}
 else if(sourcePanel==='sprint'&&targetPanel==='next'){const[item]=P.splice(li,1);N.splice(cl(ni,0,N.length),0,item);}
 else if(sourcePanel==='next'&&targetPanel==='sprint'){const[item]=N.splice(li,1);P.splice(cl(ni,0,P.length),0,item);}
 reorderDrag=null;render();
}

window.addEventListener('mousemove',e=>{
 if(reorderDrag){updateReorderVisuals(e);return;}
 if(!blockDrag)return;
 const found=findBlk(blockDrag.bid);if(!found)return;const blk=found.b;
 if(blockDrag.act==='resize-r'||blockDrag.act==='resize-l'){
  const dq=Math.round((e.clientX-blockDrag.sx)/QW),maxQ=S.sprints*4;
  if(blockDrag.act==='resize-r'){const ndq=cl(blockDrag.odq+dq,1,maxQ-blockDrag.os);if(ndq!==blk.durationQ){blk.durationQ=ndq;render();}}
  else{const dd=cl(dq,-blockDrag.os,blockDrag.odq-1),ns=blockDrag.os+dd,ndq=blockDrag.odq-dd;if(ns!==blk.startQ||ndq!==blk.durationQ){blk.startQ=ns;blk.durationQ=ndq;render();}}
  return;
 }
 if(blockDrag.act==='move'){
  const dx=Math.abs(e.clientX-blockDrag.sx),dy=Math.abs(e.clientY-blockDrag.sy);
  if(blockDrag.mode==='pending'){
   if(dx>8||dy>8)blockDrag.mode=dy>dx?'v':'h';else return;
  }
  if(blockDrag.mode==='h'){
   const dq=Math.round((e.clientX-blockDrag.sx)/QW),maxQ=S.sprints*4;
   const ns=cl(blockDrag.os+dq,0,maxQ-blockDrag.odq);if(ns!==blk.startQ){blk.startQ=ns;render();}
  }else if(blockDrag.mode==='v'){
   const p2=P.find(x=>x.id===blockDrag.pid);if(!p2||p2.blocks.length<2)return;
   const rowEl=document.querySelector(`.pl-row[data-pid="${p2.id}"]`);if(!rowEl)return;
   const rowRect=rowEl.getBoundingClientRect(),cy=e.clientY-rowRect.top;
   const li2=assignLanes(p2.blocks);
   let targetLane=li2.numLanes-1;
   for(let i=0;i<li2.laneY.length;i++){if(cy<li2.laneY[i]+li2.laneH[i]/2){targetLane=i;break;}}
   const currentLane=li2.blockLane.get(blockDrag.bid)??0;
   if(targetLane!==currentLane){
    const idx=p2.blocks.findIndex(b=>b.id===blockDrag.bid);
    const item=p2.blocks.splice(idx,1)[0];
    p2.blocks.splice(cl(idx+(targetLane<currentLane?-1:1),0,p2.blocks.length),0,item);render();
   }
  }
 }
});
window.addEventListener('mouseup',()=>{if(reorderDrag){finishReorderDrag();}blockDrag=null;});

document.getElementById('np-addbtn').addEventListener('click',()=>{snapshot();N.push({id:nid(),name:'New project',ci:N.length%PC.length,blocks:[]});renderNextPanel();document.getElementById('np-count').textContent=N.length;saveState();});

const _urlPlanId=new URLSearchParams(window.location.search).get('plan')||EMBEDDED_PLAN_ID;
if(_urlPlanId){
 cloudLoad(_urlPlanId).then(loaded=>{
  if(loaded){
   // Keep URL in sync if loaded from embedded ID
   const url=new URL(window.location.href);
   url.searchParams.set('plan',_urlPlanId);
   window.history.replaceState({},'',url.toString());
   render();requestAnimationFrame(render);
  }else{loadState();render();requestAnimationFrame(render);}
 });
}else{
 loadState();
 sbRequest('POST','/rest/v1/plans',{title:planTitle,data:{P,N,S,planTitle,uid}})
  .then(result=>{
   cloudPlanId=result[0].id;
   const url=new URL(window.location.href);
   url.searchParams.set('plan',cloudPlanId);
   window.history.replaceState({},'',url.toString());
  })
  .catch(e=>console.warn('Could not create cloud plan:',e));
 render();requestAnimationFrame(render);
}
window.addEventListener('resize',render);
document.addEventListener('keydown',e=>{
 const mod=e.metaKey||e.ctrlKey;
 if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
 if(mod&&(e.key==='Z'||e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
});
</script>
</body>
